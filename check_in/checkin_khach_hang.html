<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Danh sách khách hàng (nv_checkin_khach_hang)</title>

  <script src="/js/internal_key.js"></script>

  <style>
    :root{
      --bg:#0b1020;
      --panel:#12182b;
      --muted:#8aa0b6;
      --text:#e9f0f6;
      --accent:#4da3ff;
      --ok:#22c55e;
      --warn:#f59e0b;
      --err:#ef4444;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
    }

    h1{
      font-size:24px;
      margin:0 0 16px;
    }

    .bar{
      display:flex;
      gap:8px;
      align-items:center;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .bar-left{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      flex:1;
      min-width:0;
    }

    .btn{
      padding:8px 12px;
      border:0;
      border-radius:12px;
      background:var(--panel);
      color:var(--text);
      cursor:pointer;
    }

    .btn:hover{filter:brightness(1.08)}

    .btn-primary{
      background:var(--accent);
      color:#001226;
    }

    .btn-ok{
      background:var(--ok);
      color:#02220f;
    }

    .btn-warn{background:var(--warn)}

    .btn-disabled{
      background:#4b5563 !important;
      color:#cbd5f5 !important;
      cursor:not-allowed !important;
      opacity:.7;
      box-shadow:none !important;
      pointer-events:none;
    }

    .input{
      width:100%;
      padding:8px 10px;
      background:#0f1628;
      border:1px solid #243153;
      color:var(--text);
      border-radius:12px;
    }

    .muted{
      color:var(--muted);
      font-size:12px;
    }

    .table{
      width:100%;
      border-collapse:collapse;
      background:var(--panel);
      border-radius:14px;
      overflow:hidden;
    }

    thead th{
      font-weight:600;
      text-align:left;
      font-size:13px;
      color:var(--muted);
      background:#0f1628;
    }

    th,td{
      padding:10px 12px;
      border-bottom:1px solid #19223c;
    }

    tbody tr:hover{background:#0f1930}

    .col-actions{white-space:nowrap}

    .ma-kh-btn{
      border:0;
      border-radius:999px;
      padding:6px 12px;
      background:var(--ok);
      color:#02220f;
      font-weight:600;
      cursor:pointer;
      box-shadow:0 0 0 1px rgba(0,0,0,.25),0 6px 14px rgba(0,0,0,.4);
      transition:transform .06s ease, box-shadow .06s ease, filter .08s ease;
    }

    .ma-kh-btn:hover{
      filter:brightness(1.06);
    }

    .ma-kh-btn:active{
      transform:translateY(1px) scale(.97);
      box-shadow:0 2px 6px rgba(0,0,0,.55);
    }

    .ma-kh-btn.ma-kh-disabled{
      background:#4b5563;
      color:#cbd5f5;
      cursor:default;
      box-shadow:none;
      opacity:.7;
    }

    .ma-kh-btn.ma-kh-disabled:hover,
    .ma-kh-btn.ma-kh-disabled:active{
      transform:none;
      filter:none;
    }

    .modal-wrap{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.4);
      backdrop-filter:blur(2px);
      z-index:1000;
    }

    .modal{
      width:min(620px,92vw);
      background:var(--panel);
      border:1px solid #1e2943;
      border-radius:16px;
      padding:16px;
    }

    .modal h3{
      margin:0 0 12px;
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .grid label{
      display:flex;
      flex-direction:column;
      gap:6px;
      font-size:14px;
    }

    .grid .span2{
      grid-column:1 / span 2;
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .right{
      margin-left:auto;
    }

    .toast{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      min-width:min(92vw,420px);
      text-align:center;
      background:#0f1628;
      border:1px solid #243153;
      padding:14px 18px;
      border-radius:16px;
      display:none;
      z-index:2000;
      box-shadow:0 14px 40px rgba(0,0,0,.6);
      font-size:15px;
    }

    @media (max-width:640px){
      .grid{
        grid-template-columns:1fr;
      }

      .grid .span2{
        grid-column:auto;
      }
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="bar">
    <div class="bar-left">
      <button id="btnAdd" class="btn btn-primary">+ Thêm</button>

      <label class="row" style="gap:6px">
        <span class="muted">Bán kính</span>
        <select id="radiusSelect" class="input">
          <option value="20">20m</option>
          <option value="50" selected>50m</option>
          <option value="100">100m</option>
          <option value="500">500m</option>
        </select>
      </label>
    </div>

    <button id="btnOpenCheckin" class="btn btn-ok">
      📷 Checkin
    </button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th style="width:160px">Mã KH</th>
        <th>Tên KH</th>
        <th style="width:160px">Điện thoại</th>
        <th class="col-actions" style="width:120px">Thao tác</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr>
        <td colspan="4" class="muted">Đang tải...</td>
      </tr>
    </tbody>
  </table>

  <div id="countInfo" class="muted" style="margin-top:8px"></div>
</div>

<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <h3 id="modalTitle">Thêm khách hàng</h3>

    <div class="grid">
      <label class="span2" id="maKhRow">
        Mã KH (khóa):
        <input id="f_ma_kh" class="input" readonly>
      </label>

      <label class="span2">
        Tên KH:
        <input id="f_ten_kh" class="input" placeholder="VD: Nguyễn Văn A">
      </label>

      <label class="span2">
        Địa chỉ:
        <input id="f_dia_chi" class="input" placeholder="Số nhà, đường...">
      </label>

      <label>
        Phường/Xã:
        <input id="f_phuong_xa" class="input" placeholder="Tự lấy theo tọa độ">
      </label>

      <label>
        Quận/Huyện:
        <input id="f_quan_huyen" class="input" placeholder="Tự lấy theo tọa độ">
      </label>

      <label class="span2">
        Thành phố:
        <input id="f_thanh_pho" class="input" placeholder="Tự lấy theo tọa độ">
      </label>

      <label class="span2">
        Điện thoại:
        <input id="f_dien_thoai" class="input" placeholder="VD: 09xxxxxxxx">
      </label>

      <input id="f_lat" type="hidden">
      <input id="f_lon" type="hidden">
    </div>

    <div class="row" style="margin-top:12px">
      <button id="btnSave" class="btn btn-ok">Lưu</button>
      <button id="btnCancel" class="btn">Hủy</button>
      <span class="right muted" id="modalHint"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function setVal(id, value) {
    const el = document.getElementById(id);
    if (el) el.value = value || '';
  }

  function setHint(text) {
    const el = document.getElementById('modalHint');
    if (el) el.textContent = text || '';
  }

  function getAddressPart(address, keys) {
    for (const key of keys) {
      if (address && address[key]) return address[key];
    }
    return '';
  }

  async function fillAddressByCurrentLocation() {
    if (!navigator.geolocation) {
      setHint('Máy không hỗ trợ lấy tọa độ');
      return;
    }

    setHint('Đang lấy tọa độ...');

    navigator.geolocation.getCurrentPosition(async function(pos) {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      setVal('f_lat', lat);
      setVal('f_lon', lon);

      try {
        setHint('Đang lấy phường/quận/thành phố...');

        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&accept-language=vi`;
        const res = await fetch(url);
        const data = await res.json();
        const address = data.address || {};

        const phuongXa = getAddressPart(address, [
          'ward',
          'suburb',
          'quarter',
          'neighbourhood',
          'village',
          'town'
        ]);

        const quanHuyen = getAddressPart(address, [
          'city_district',
          'district',
          'county',
          'municipality'
        ]);

        const thanhPho = getAddressPart(address, [
          'city',
          'state',
          'province'
        ]);

        setVal('f_phuong_xa', phuongXa);
        setVal('f_quan_huyen', quanHuyen);
        setVal('f_thanh_pho', thanhPho);

        setHint('Đã lấy địa chỉ theo tọa độ');
      } catch (err) {
        console.error(err);
        setHint('Không lấy được phường/quận/thành phố');
      }
    }, function() {
      setHint('Bạn chưa cho phép lấy vị trí');
    }, {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    const btnAdd = document.getElementById('btnAdd');

    if (btnAdd) {
      btnAdd.addEventListener('click', function() {
        setVal('f_phuong_xa', '');
        setVal('f_quan_huyen', '');
        setVal('f_thanh_pho', '');
        setVal('f_lat', '');
        setVal('f_lon', '');

        fillAddressByCurrentLocation();
      });
    }
  });
</script>

<script defer src="../js/checkin_khach_hang.js"></script>
</body>
</html>
