<script>
/* ==== Tải supabase-js nếu chưa có ==== */
async function getSupabaseLib(){
  if (window.supabase?.createClient) return window.supabase;
  const mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  return mod;
}

(async () => {
  const $  = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));

  const toast = (msg,t='')=>{
    const el = $('#toast');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.borderColor =
      t==='err' ? '#ef4444' :
      t==='ok'  ? '#22c55e' :
                  '#243153';
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>el.style.display='none',2400);
  };

  // helper escape attribute/html đơn giản
  function escAttr(v){
    return String(v ?? '')
      .replace(/&/g,'&amp;')
      .replace(/"/g,'&quot;')
      .replace(/</g,'&lt;');
  }

  const TABLE           = 'nv_checkin_khach_hang';
  const SESSION_IMG_KEY = 'CHECKIN_IMAGE_PAYLOAD';

  // Bảng log checkin
  const CHECKIN_TABLE    = 'nv_checkin';
  const CHECKIN_DATE_COL = 'ngay'; // text dạng dd/MM/yyyy hh:mm

  let SB            = null;
  let CURRENT       = null;
  let CHECKED_TODAY = false; // true = NV này đã checkin hôm nay (khóa)
  let HIDDEN_TODAY_COUNT = 0; // số khách bị ẩn vì ngay_cuoi_cung_checkin = hôm nay

  // ===== Helpers chung =====
  function getLatLngFromURL(){
    const qp = new URLSearchParams(location.search);
    const latRaw = qp.get('lat') ?? qp.get('latitude');
    const lngRaw = qp.get('lng') ?? qp.get('long') ?? qp.get('lon') ?? qp.get('longitude');
    const lat = Number(latRaw), lng = Number(lngRaw);
    if (Number.isFinite(lat) && Number.isFinite(lng)) return { lat, lng };
    return null;
  }

  function initRadiusFromURLOrDefault(){
    const sel = $('#radiusSelect');
    const qp = new URLSearchParams(location.search);
    let r = Number(qp.get('radius'));
    const rkm = Number(qp.get('radius_km'));
    if (Number.isFinite(rkm) && rkm > 0) r = rkm * 1000;
    if (!Number.isFinite(r) || r <= 0) r = 50;
    if ([20,50,100,500].includes(Math.round(r))){
      sel.value = String(Math.round(r));
    } else {
      sel.value = '50';
    }
  }

  function getRadiusFromUI(){
    const v = Number($('#radiusSelect').value);
    return Number.isFinite(v) && v > 0 ? v : 50;
  }

  function getCurrentNVID(){
    try{
      const s = sessionStorage.getItem('nv_ctx');
      if (s){
        const o = JSON.parse(s);
        if (o?.ma_nv) return String(o.ma_nv);
      }
    }catch{}
    try{
      const s2 = localStorage.getItem('nv');
      if (s2){
        const o2 = JSON.parse(s2);
        if (o2?.ma_nv) return String(o2.ma_nv);
      }
    }catch{}
    return null;
  }

  function getCurrentNVName(){
    try{
      const s = sessionStorage.getItem('nv_ctx');
      if (s){
        const o = JSON.parse(s);
        if (o?.ten_nv) return String(o.ten_nv);
      }
    }catch{}
    try{
      const s2 = localStorage.getItem('nv');
      if (s2){
        const o2 = JSON.parse(s2);
        if (o2?.ten_nv) return String(o2.ten_nv);
      }
    }catch{}
    return null;
  }

  function getImagePayloadFromSession(){
    try{
      const raw = sessionStorage.getItem(SESSION_IMG_KEY);
      if (!raw) return null;
      const p = JSON.parse(raw);
      if (p && typeof p.image_b64 === 'string' && p.image_b64.length > 0){
        return p;
      }
    }catch{}
    return null;
  }

  function cssEscapeSafe(v){
    try{
      return CSS && CSS.escape ? CSS.escape(v) : String(v).replace(/"/g,'\\"');
    }catch{
      return String(v).replace(/"/g,'\\"');
    }
  }

  // ==== Hỗ trợ ngày hôm nay (dd/MM/yyyy) ====
  function getTodayPrefix_ddMMyyyy(){
    const d = new Date();
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear();
    return `${dd}/${mm}/${yyyy}`;
  }

  // ==== So sánh text ngày dạng dd/MM/yyyy hh:mm với hôm nay ====
  function isSameTodayFromText(v){
    const s = String(v || '').trim();
    if (!s) return false;
    return s.startsWith(getTodayPrefix_ddMMyyyy());
  }

  // ==== Lọc bỏ khách đã có ngay_cuoi_cung_checkin là hôm nay ====
  function filterOutCustomersCheckedToday(rows){
    const arr = Array.isArray(rows) ? rows : [];
    HIDDEN_TODAY_COUNT = 0;

    const filtered = arr.filter(r=>{
      const hide = isSameTodayFromText(r.ngay_cuoi_cung_checkin);
      if (hide) HIDDEN_TODAY_COUNT++;
      return !hide;
    });

    return filtered;
  }

  function updateCountInfo(visibleCount, extraText=''){
    let txt = `${visibleCount} dòng`;
    if (HIDDEN_TODAY_COUNT > 0){
      txt += ` • Ẩn ${HIDDEN_TODAY_COUNT} KH đã check-in hôm nay`;
    }
    if (extraText) txt += ` • ${extraText}`;
    $('#countInfo').textContent = txt;
  }

  // ===== Khóa / mở khóa nút theo CHECKED_TODAY =====
  function applyCheckedTodayLock(){
    const btnAdd = $('#btnAdd');
    if (btnAdd){
      if (CHECKED_TODAY){
        btnAdd.classList.add('btn-disabled');
        btnAdd.disabled = true;
      }else{
        btnAdd.classList.remove('btn-disabled');
        btnAdd.disabled = false;
      }
    }

    $$('#tbody .btn-edit').forEach(b=>{
      if (CHECKED_TODAY){
        b.classList.add('btn-disabled');
        b.disabled = true;
      }else{
        b.classList.remove('btn-disabled');
        b.disabled = false;
      }
    });
  }

  // ==== Kiểm tra xem NV hiện tại đã checkin hôm nay chưa ====
  async function loadCheckedToday(){
    CHECKED_TODAY = false;

    const ma_nv = getCurrentNVID();
    if (!ma_nv) return false;

    const todayPrefix = getTodayPrefix_ddMMyyyy();

    try{
      const { data, error } = await SB
        .from(CHECKIN_TABLE)
        .select(`ma_nv, ${CHECKIN_DATE_COL}`)
        .eq('ma_nv', ma_nv)
        .like(CHECKIN_DATE_COL, todayPrefix + '%')
        .limit(1);

      if (error){
        console.warn('nv_checkin bị chặn quyền/RLS:', error.message || error);
        CHECKED_TODAY = false;
        return false;
      }

      const HAS_CHECKIN_TODAY = Array.isArray(data) && data.length > 0;
      console.log('HAS_CHECKIN_TODAY =', HAS_CHECKIN_TODAY, data);

      CHECKED_TODAY = false; // giữ nguyên như code gốc của bạn
      return HAS_CHECKIN_TODAY;
    }catch(err){
      console.warn('Lỗi đọc nv_checkin:', err);
      CHECKED_TODAY = false;
      return false;
    }
  }

  // ===== Webhook URL =====
  function getWebhookURL(){
    return 'https://dhsybbqoe.datadex.vn/webhook/hoadon';
  }

  // ===== Gửi webhook =====
  async function postWebhook(payload){
    const url = getWebhookURL();
    const headers = { 'content-type':'application/json' };
    try{
      if (typeof getInternalKey === 'function'){
        headers['x-internal-key'] = getInternalKey();
      }
    }catch{}

    try{
      const res = await fetch(url, { method:'POST', headers, body: JSON.stringify(payload) });
      const text = await res.text().catch(()=> '');
      if (res.ok) return { ok:true, status:res.status, text };
      if (res.status !== 405) return { ok:false, status:res.status, text };
    }catch(e){}

    const qs = new URLSearchParams(Object.entries(payload).map(([k,v])=>[k, String(v ?? '')])).toString();
    const getUrl = url + (url.includes('?') ? '&' : '?') + qs;
    try{
      const res2 = await fetch(getUrl, { method:'GET', headers: { 'x-internal-key': headers['x-internal-key'] || '' } });
      const text2 = await res2.text().catch(()=> '');
      return { ok: res2.ok, status: res2.status, text: text2 };
    }catch(e2){
      return { ok:false, status:0, text:String(e2) };
    }
  }

  // ===== Modal =====
  function openModal(mode,row=null){
    CURRENT = { mode };
    $('#modalTitle').textContent = mode==='add' ? 'Thêm khách hàng' : 'Sửa khách hàng';
    $('#f_ma_kh').disabled = (mode==='edit');

    if (mode==='edit' && row){
      $('#f_ma_kh').value      = row.ma_kh || '';
      $('#f_ten_kh').value     = row.ten_kh || '';
      $('#f_dia_chi').value    = row.dia_chi || '';
      $('#f_dien_thoai').value = row.dien_thoai || '';
      CURRENT.ma_kh = row.ma_kh;
    }else{
      $('#f_ma_kh').value      = '';
      $('#f_ten_kh').value     = '';
      $('#f_dia_chi').value    = '';
      $('#f_dien_thoai').value = '';
    }

    $('#modalWrap').style.display = 'flex';
  }

  const closeModal = () => $('#modalWrap').style.display='none';

  // ===== Supabase client =====
  async function makeClient(){
    const url  = getConfig('url');
    const anon = getConfig('anon');
    const lib  = await getSupabaseLib();
    return lib.createClient(url,anon,{auth:{persistSession:false}});
  }

  // ===== List & render (không theo bán kính) =====
  async function loadData(){
    $('#tbody').innerHTML = `<tr><td colspan="4" class="muted">Đang tải...</td></tr>`;

    const { data, error } = await SB
      .from(TABLE)
      .select('ma_kh,ten_kh,dia_chi,dien_thoai,ngay_cuoi_cung_checkin')
      .order('ten_kh',{ascending:true})
      .limit(500);

    if (error){
      console.error(error);
      $('#tbody').innerHTML =
        `<tr><td colspan="4" class="muted">Lỗi Supabase: ${error.message}</td></tr>`;
      return;
    }

    const filteredRows = filterOutCustomersCheckedToday(data || []);

    if (!filteredRows.length){
      $('#tbody').innerHTML =
        `<tr><td colspan="4" class="muted">Không có dữ liệu</td></tr>`;
      updateCountInfo(0);
      if (HIDDEN_TODAY_COUNT > 0){
        toast(`Đã ẩn ${HIDDEN_TODAY_COUNT} khách đã check-in hôm nay`, 'ok');
      }
      return;
    }

    renderRows(filteredRows);
    updateCountInfo(filteredRows.length);

    if (HIDDEN_TODAY_COUNT > 0){
      toast(`Đã ẩn ${HIDDEN_TODAY_COUNT} khách đã check-in hôm nay`, 'ok');
    }
  }

  function renderRows(rows){
    if (!rows.length){
      $('#tbody').innerHTML =
        `<tr><td colspan="4" class="muted">Không có dữ liệu</td></tr>`;
    } else {
      const html = rows.map(r => {
        const disabled = CHECKED_TODAY === true;
        const btnHtml = disabled
          ? `<button class="ma-kh-btn ma-kh-disabled" disabled title="Nhân viên đã checkin hôm nay">${escAttr(r.ma_kh)}</button>`
          : `<button class="ma-kh-btn" data-id="${escAttr(r.ma_kh)}">${escAttr(r.ma_kh)}</button>`;

        return `
        <tr data-id="${escAttr(r.ma_kh)}"
            data-ten_kh="${escAttr(r.ten_kh || '')}"
            data-dia_chi="${escAttr(r.dia_chi || '')}"
            data-dien_thoai="${escAttr(r.dien_thoai || '')}"
            data-ngay_cuoi_cung_checkin="${escAttr(r.ngay_cuoi_cung_checkin || '')}">

          <td class="col-ma">
            ${btnHtml}
          </td>
          <td class="col-ten">${escAttr(r.ten_kh || '')}</td>
          <td class="col-phone">${escAttr(r.dien_thoai || '')}</td>
          <td class="col-actions">
            <button class="btn btn-warn btn-edit">Sửa</button>
          </td>
        </tr>`;
      }).join('');

      $('#tbody').innerHTML = html;
    }

    $$('#tbody .btn-edit').forEach(b =>
      b.addEventListener('click', onEditClick)
    );

    $$('#tbody .ma-kh-btn:not(.ma-kh-disabled)').forEach(b =>
      b.addEventListener('click', () => onMaKHClick(b.dataset.id))
    );

    applyCheckedTodayLock();
  }

  function onEditClick(e){
    const tr = e.target.closest('tr');
    if (!tr) return;

    const row = {
      ma_kh:      tr.getAttribute('data-id'),
      ten_kh:     tr.dataset.ten_kh || '',
      dia_chi:    tr.dataset.dia_chi || '',
      dien_thoai: tr.dataset.dien_thoai || ''
    };

    openModal('edit', row);
  }

  // ===== Click Mã KH → gửi webhook =====
  async function onMaKHClick(ma_kh){
    const coords = getLatLngFromURL();
    if (!coords){
      toast('Thiếu toạ độ lat/lng trong URL — không thể checkin','err');
      return;
    }

    const ma_nv  = getCurrentNVID();
    const ten_nv = getCurrentNVName();
    const img    = getImagePayloadFromSession();

    const payload = {
      action: 'checkin',
      ma_kh,
      ma_nv:  ma_nv  || null,
      ten_nv: ten_nv || null,
      lat: Number(coords.lat),
      lng: Number(coords.lng),
      image_mime: img?.image_mime || 'image/jpeg',
      image_b64:  img?.image_b64  || ''
    };

    try{
      const res = await postWebhook(payload);
      if (res.ok){
        CHECKED_TODAY = true;

        // Ẩn ngay dòng vừa checkin
        const tr = document.querySelector(`tr[data-id="${cssEscapeSafe(ma_kh)}"]`);
        if (tr) tr.remove();

        // khóa nút còn lại
        $$('.ma-kh-btn').forEach(btn=>{
          btn.classList.add('ma-kh-disabled');
          btn.disabled = true;
          btn.removeAttribute('data-id');
          btn.title = 'Nhân viên đã checkin hôm nay';
        });

        applyCheckedTodayLock();

        const rowCount = $$('#tbody tr[data-id]').length;
        updateCountInfo(rowCount);

        toast(`✅ ĐÃ CHECK IN KH: ${ma_kh}`,'ok');
      } else {
        toast(`Webhook lỗi ${res.status}: ${res.text?.slice(0,160) || '...'}`,'err');
      }
    }catch(err){
      console.error(err);
      toast('Gửi webhook thất bại','err');
    }
  }

  // ===== TỰ SINH MÃ KH =====
  function generateMaKH(){
    const d = new Date();
    const yy = String(d.getFullYear()).slice(-2);
    const MM = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    return yy + MM + dd + hh + mm + ss;
  }

  // ===== KIỂM TRA MÃ KH TRÙNG =====
  async function checkMaKHExists(ma_kh){
    const { data, error } = await SB
      .from(TABLE)
      .select('ma_kh')
      .eq('ma_kh', ma_kh)
      .limit(1);

    if (error){
      console.error('Lỗi check mã KH:', error);
      return false;
    }

    return Array.isArray(data) && data.length > 0;
  }

  // ===== Lưu =====
  async function saveForm(){
    let ma_kh          = $('#f_ma_kh').value.trim();
    const ten_kh       = $('#f_ten_kh').value.trim();
    const dia_chi      = $('#f_dia_chi').value.trim();
    const dien_thoai   = $('#f_dien_thoai').value.trim();

    if (CURRENT?.mode === 'add'){
      if (!ma_kh){
        ma_kh = generateMaKH();
        $('#f_ma_kh').value = ma_kh;
        toast(`Tự sinh mã KH: ${ma_kh}`,'ok');
      }

      const exists = await checkMaKHExists(ma_kh);
      if (exists){
        toast(`❌ Mã KH ${ma_kh} đã tồn tại, vui lòng nhập mã khác hoặc để trống để tự sinh`,'err');
        return;
      }
    } else {
      if (!ma_kh){
        toast('Mã KH không được trống','err');
        return;
      }
    }

    const coords = getLatLngFromURL();
    const lat = coords?.lat ?? null;
    const lng = coords?.lng ?? null;

    if (CURRENT?.mode === 'add'){
      const { error } = await SB
        .from(TABLE)
        .insert([{
          ma_kh,
          ten_kh,
          dia_chi,
          dien_thoai,
          lat,
          lng
        }]);

      if (error){
        console.error(error);
        toast('Thêm thất bại','err');
        return;
      }

      toast('Đã thêm','ok');
    } else {
      const { error } = await SB
        .from(TABLE)
        .update({
          ten_kh,
          dia_chi,
          dien_thoai,
          lat,
          lng
        })
        .eq('ma_kh', CURRENT.ma_kh);

      if (error){
        console.error(error);
        toast('Sửa thất bại','err');
        return;
      }

      toast('Đã lưu','ok');
    }

    closeModal();

    if (coords){
      runNearby(coords.lat, coords.lng, getRadiusFromUI());
    } else {
      loadData();
    }
  }

  // ===== Nearby runner =====
  async function runNearby(lat, lng, radius){
    const $tbody = $('#tbody');
    $tbody.innerHTML =
      `<tr><td colspan="4" class="muted">Đang lọc theo bán kính...</td></tr>`;

    const R = 6371000, d2r = Math.PI/180, latR = lat*d2r;
    const delta = (radius / R) * (180/Math.PI);
    const cosLat = Math.max(1e-6, Math.cos(latR));
    const minLat = lat - delta, maxLat = lat + delta;
    const minLng = lng - delta/cosLat;
    const maxLng = lng + delta/cosLat;

    const { data, error } = await SB
      .from(TABLE)
      .select('ma_kh,ten_kh,dia_chi,dien_thoai,lat,lng,ngay_cuoi_cung_checkin')
      .not('lat','is',null).not('lng','is',null)
      .gte('lat', minLat).lte('lat', maxLat)
      .gte('lng', minLng).lte('lng', maxLng)
      .limit(1000);

    if (error){
      console.error(error);
      toast('Lỗi truy vấn Supabase','err');
      $('#tbody').innerHTML =
        `<tr><td colspan="4" class="muted">Không có dữ liệu</td></tr>`;
      updateCountInfo(0, 'lỗi truy vấn');
      return;
    }

    const filteredRaw = filterOutCustomersCheckedToday(data || []);

    const rows = filteredRaw
      .map(r => ({ ...r, rlat:Number(r.lat), rlng:Number(r.lng) }))
      .filter(r => Number.isFinite(r.rlat) && Number.isFinite(r.rlng));

    let nearby = rows.map(r=>{
      const dLat = (r.rlat - lat) * d2r;
      const dLng = (r.rlng - lng) * d2r;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(latR) * Math.cos(r.rlat*d2r) * Math.sin(dLng/2)**2;
      const dist = 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return { ...r, dist: Math.round(dist) };
    }).filter(r => r.dist <= radius)
      .sort((a,b)=>a.dist - b.dist);

    if (nearby.length === 0){
      $('#tbody').innerHTML =
        `<tr><td colspan="4" class="muted">Không có dữ liệu</td></tr>`;
      updateCountInfo(0, `lọc ${Math.round(radius)}m`);

      if (HIDDEN_TODAY_COUNT > 0){
        toast(`Không có KH hiển thị. Đã ẩn ${HIDDEN_TODAY_COUNT} khách đã check-in hôm nay`, 'ok');
      } else {
        toast(`Không có KH trong ${Math.round(radius)}m`, 'info');
      }
      return;
    }

    const html = nearby.map(r=>{
      const disabled = CHECKED_TODAY === true;
      const btnHtml = disabled
        ? `<button class="ma-kh-btn ma-kh-disabled" disabled title="Nhân viên đã checkin hôm nay">${escAttr(r.ma_kh)}</button>`
        : `<button class="ma-kh-btn" data-id="${escAttr(r.ma_kh)}">${escAttr(r.ma_kh)}</button>`;

      return `
      <tr data-id="${escAttr(r.ma_kh)}"
          data-ten_kh="${escAttr(r.ten_kh || '')}"
          data-dia_chi="${escAttr(r.dia_chi || '')}"
          data-dien_thoai="${escAttr(r.dien_thoai || '')}"
          data-ngay_cuoi_cung_checkin="${escAttr(r.ngay_cuoi_cung_checkin || '')}">

        <td class="col-ma">
          ${btnHtml}
        </td>
        <td class="col-ten">
          ${escAttr(r.ten_kh || '')}
          <span class="muted"> • ${r.dist}m</span>
        </td>
        <td class="col-phone">${escAttr(r.dien_thoai || '')}</td>
        <td class="col-actions">
          <button class="btn btn-warn btn-edit">Sửa</button>
        </td>
      </tr>`;
    }).join('');

    $('#tbody').innerHTML = html;
    updateCountInfo(nearby.length, `lọc ${Math.round(radius)}m`);

    $$('#tbody .btn-edit').forEach(b =>
      b.addEventListener('click', onEditClick)
    );
    $$('#tbody .ma-kh-btn:not(.ma-kh-disabled)').forEach(b =>
      b.addEventListener('click', () => onMaKHClick(b.dataset.id))
    );

    applyCheckedTodayLock();

    if (HIDDEN_TODAY_COUNT > 0){
      toast(`Tìm thấy ${nearby.length} KH • Đã ẩn ${HIDDEN_TODAY_COUNT} KH đã check-in hôm nay`, 'ok');
    } else {
      toast(`Tìm thấy ${nearby.length} KH trong ${Math.round(radius)}m`, 'ok');
    }
  }

  // ===== events =====
  $('#btnAdd').addEventListener('click',()=>openModal('add'));
  $('#btnCancel').addEventListener('click',closeModal);
  $('#btnSave').addEventListener('click',saveForm);

  const btnOpenCheckin = $('#btnOpenCheckin');
  if (btnOpenCheckin){
    btnOpenCheckin.addEventListener('click', ()=>{
      location.assign('app_checkin.html');
    });
  }

  $('#radiusSelect').addEventListener('change',()=>{
    const coords = getLatLngFromURL();
    const r = getRadiusFromUI();
    if (coords) runNearby(coords.lat, coords.lng, r);
    else toast('Thiếu toạ độ lat/lng trong URL để lọc theo bán kính', 'err');
  });

  // ======================= init =======================
  try{
    SB = await makeClient();

    await loadCheckedToday();
    applyCheckedTodayLock();
    initRadiusFromURLOrDefault();

    const coords = getLatLngFromURL();
    if (coords){
      const r = getRadiusFromUI();
      toast(`lat=${coords.lat.toFixed(6)} • lng=${coords.lng.toFixed(6)} • r=${Math.round(r)}m`, 'ok');
      runNearby(coords.lat, coords.lng, r);
    }else{
      loadData();
    }
  }catch(e){
    console.error(e);
    $('#tbody').innerHTML =
      `<tr><td colspan="4" class="muted">Lỗi khởi tạo: ${e.message}</td></tr>`;
  }
})();
</script>
