<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Bản đồ Check-in KH</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html,body{
      margin:0; padding:0;
      height:100%;
      overflow:hidden;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }
    #map{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
    }
    .leaflet-control-zoom{ display:none !important; }
    .top-controls{
      position:fixed;
      top:10px;
      left:10px;
      right:10px;
      z-index:2000;
      display:flex;
      flex-direction:column;
      gap:8px;
      pointer-events:none;
    }
    .row{
      display:flex;
      gap:8px;
      width:100%;
      pointer-events:auto;
    }
    .row select, #searchBox{
      flex:1;
      min-width:0;
      padding:6px 8px;
      font-size:14px;
      border-radius:8px;
      border:1px solid #d1d5db;
      background:white;
    }
    #gpsBtn,#geoToggle{
      height:40px;
      border:none;
      background:white;
      box-shadow:0 4px 10px rgba(0,0,0,0.25);
      cursor:pointer;
    }
    #gpsBtn{
      width:40px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      flex:0 0 40px;
    }
    #geoToggle{
      border-radius:8px;
      padding:0 10px;
      font-size:13px;
      font-weight:700;
      color:#111827;
      white-space:nowrap;
    }
    #geoToggle.is-off{
      opacity:0.65;
    }
    .mk-red,
    .mk-orange,
    .mk-purple{
      color:white;
      width:26px;
      height:26px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid white;
      font-weight:600;
      font-size:12px;
      box-shadow:0 0 0 1px rgba(0,0,0,0.3),0 4px 8px rgba(0,0,0,0.2);
    }
    .mk-red{ background:#ef4444; }
    .mk-orange{ background:#f59e0b; }
    .mk-purple{ background:#8b5cf6; }
    .ward-label{
      color:#111827;
      font-weight:800;
      font-size:11px;
      text-shadow:0 1px 2px white,0 -1px 2px white,1px 0 2px white,-1px 0 2px white;
      pointer-events:none;
    }
    .ward-legend{
      position:fixed;
      left:10px;
      bottom:18px;
      z-index:2000;
      background:white;
      color:#111827;
      border-radius:8px;
      box-shadow:0 8px 18px rgba(0,0,0,0.22);
      padding:8px 10px;
      font-size:12px;
      line-height:1.5;
      max-width:210px;
    }
    .ward-legend.is-hidden{ display:none; }
    .ward-legend b{ display:block; margin-bottom:3px; }
    .lg-row{ display:flex; align-items:center; gap:6px; }
    .lg-color{ width:18px; height:10px; border-radius:3px; border:1px solid rgba(0,0,0,0.2); }
  </style>
</head>

<body>

<div class="top-controls">
  <div class="row">
    <button id="gpsBtn">📍</button>

    <select id="levelFilter">
      <option value="">Tất cả</option>
      <option value="1">1 màu đỏ check in về (chưa có số đt)</option>
      <option value="2">2 màu cam (đã check in có đt)</option>
      <option value="3">3 màu tím (nv đã checkin ở tháng này)</option>
      <option value="buy">Khách đã mua hàng</option>
      <option value="nobuy">Khách chưa mua hàng</option>
    </select>

    <select id="nvFilter">
      <option value="">Nhân viên</option>
    </select>
  </div>

  <div class="row">
    <button id="geoToggle" type="button">Phường mới</button>
    <select id="wardFilter">
      <option value="">Tất cả phường</option>
    </select>
  </div>

  <input id="searchBox" type="text" placeholder="Tìm kiếm KH...">
</div>

<div id="map"></div>

<div id="wardLegend" class="ward-legend is-hidden">
  <b>Màu theo số khách</b>
  <div class="lg-row"><span class="lg-color" style="background:#dbeafe"></span>0 khách</div>
  <div class="lg-row"><span class="lg-color" style="background:#93c5fd"></span>1 - 5 khách</div>
  <div class="lg-row"><span class="lg-color" style="background:#3b82f6"></span>6 - 15 khách</div>
  <div class="lg-row"><span class="lg-color" style="background:#1d4ed8"></span>Trên 15 khách</div>
</div>

<script>
(async function(){

  const GEOJSON_URL = "./geo/haiphong_phuong_moi.geojson";
  const GEOJSON_FALLBACK_URLS = [
    "https://huggingface.co/datasets/myleo198/sapnhap-bando-vn/resolve/main/geo/communes.geojson",
    "https://huggingface.co/datasets/tmquan/sapnhap-bando-vn/resolve/main/geo/communes.geojson"
  ];

  const params = new URLSearchParams(location.search);
  const currentMaNV = String(params.get("ma_nv") || "").trim();
  const currentTenNV = String(params.get("ten_nv") || "").trim();

  function safeParseStorage(key, storage){
    try { return JSON.parse(storage.getItem(key) || "null"); }
    catch { return null; }
  }

  function getLoggedNV(){
    const nv = safeParseStorage("nv", localStorage);
    if (nv && nv.ma_nv) return nv;

    const ctx = safeParseStorage("nv_ctx", sessionStorage);
    if (ctx && ctx.ma_nv) return ctx;

    return null;
  }

  const loggedNV = getLoggedNV();

  if (!currentMaNV) {
    try { alert("Thiếu mã nhân viên. Vui lòng vào từ Trang chính."); } catch {}
    location.replace("./main.html");
    throw new Error("Missing ma_nv");
  }

  if (!loggedNV || !loggedNV.ma_nv || loggedNV.hoat_dong === false) {
    try { alert("Bạn chưa đăng nhập."); } catch {}
    location.replace("./login.html");
    throw new Error("Not logged in");
  }

  if (String(loggedNV.ma_nv) !== String(currentMaNV)) {
    try { alert("Mã nhân viên không khớp tài khoản đăng nhập."); } catch {}
    location.replace("./main.html");
    throw new Error("ma_nv mismatch");
  }

  const supabase = window.supabase.createClient(
    window.getConfig("url"),
    window.getConfig("role") || window.getConfig("anon"),
    {
      global:{ headers:{ "x-internal-key": window.getInternalKey() } }
    }
  );

  const map = L.map("map", { zoomControl:false }).setView([20.85,106.68], 12);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
    maxZoom:19
  }).addTo(map);

  function esc(v){
    return String(v ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[c]));
  }

  function toNumber(v, fallback = 0){
    if (v === null || v === undefined || v === "") return fallback;
    const n = Number(v);
    return Number.isFinite(n) ? n : fallback;
  }

  function normalizePhone(v){
    return String(v || "").replace(/\D/g, "").trim();
  }

  function normalizeName(v){
    return String(v || "")
      .trim()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/đ/g, "d")
      .replace(/\b(phuong|xa|thi tran|dac khu|quan|huyen|thanh pho|tp)\b/g, "")
      .replace(/[^a-z0-9]+/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function isBought(v){
    if (v === true) return true;
    if (v === false) return false;
    const s = String(v || "").trim().toLowerCase();
    return s === "true" || s === "1" || s === "yes" || s === "đã mua hàng" || s === "da mua hang";
  }

  function getLevel(row){
    const hasPhone = normalizePhone(row.dien_thoai) !== "";
    const checkinMonth = toNumber(row.checkin_thang, 0);

    if (checkinMonth > 0) return "3";
    if (hasPhone) return "2";
    return "1";
  }

  function getColor(row){
    const level = getLevel(row);
    if (level === "3") return "purple";
    if (level === "2") return "orange";
    return "red";
  }

  function getMarkerClass(color){
    if (color === "purple") return "mk-purple";
    if (color === "orange") return "mk-orange";
    return "mk-red";
  }

  function getMarkerLabel(row, index){
    const n = toNumber(row.checkin_thang, 0);
    if (n > 0) return n;
    return index + 1;
  }

  function getWardNameFromFeature(feature){
    const p = feature && feature.properties ? feature.properties : {};
    return (
      p.ten ||
      p.name ||
      p.ten_xa ||
      p.tenxa ||
      p.ten_dvhc ||
      p.ten_short ||
      p.TEN ||
      p.NAME ||
      p.NAME_3 ||
      p.VARNAME_3 ||
      ""
    );
  }

  function isHaiPhongFeature(feature){
    const p = feature && feature.properties ? feature.properties : {};
    const text = [
      p.parent_ten,
      p.parent_name,
      p.tinh,
      p.tentinh,
      p.ten_tinh,
      p.province,
      p.address,
      p.embed_text
    ].map(v => normalizeName(v)).join(" ");

    return text.includes("hai phong");
  }

  function filterHaiPhongGeoJson(geo){
    if (!geo || !Array.isArray(geo.features)) return geo;

    const hpFeatures = geo.features.filter(isHaiPhongFeature);
    if (!hpFeatures.length) return geo;

    return {
      type:"FeatureCollection",
      features:hpFeatures
    };
  }

  function getWardKeyFromRow(row){
    return normalizeName(
      row.phuong_moi ||
      row.phuong_xa_moi ||
      row.phuong_xa ||
      row.wardName ||
      row.ward_name ||
      ""
    );
  }

  function wardFillColor(count){
    if (count > 15) return "#1d4ed8";
    if (count > 5) return "#3b82f6";
    if (count > 0) return "#93c5fd";
    return "#dbeafe";
  }

  function wardStyle(feature){
    const count = toNumber(feature.properties.__count, 0);
    return {
      color:"#1e40af",
      weight:1,
      opacity:0.85,
      fillColor:wardFillColor(count),
      fillOpacity:0.28
    };
  }

  function webMercatorToLngLat(x, y){
    const lon = x * 180 / 20037508.34;
    const lat = 180 / Math.PI * (2 * Math.atan(Math.exp(y * Math.PI / 20037508.34)) - Math.PI / 2);
    return [lon, lat];
  }

  function convertCoordsIfNeeded(coords){
    if (!Array.isArray(coords)) return coords;
    if (typeof coords[0] === "number" && typeof coords[1] === "number") {
      const x = coords[0];
      const y = coords[1];
      if (Math.abs(x) > 180 || Math.abs(y) > 90) return webMercatorToLngLat(x, y);
      return coords;
    }
    return coords.map(convertCoordsIfNeeded);
  }

  function normalizeGeoJsonProjection(geo){
    if (!geo || !Array.isArray(geo.features)) return geo;
    geo.features.forEach(f => {
      if (f.geometry && f.geometry.coordinates) {
        f.geometry.coordinates = convertCoordsIfNeeded(f.geometry.coordinates);
      }
    });
    return geo;
  }

  function pointInRing(lng, lat, ring){
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const xi = ring[i][0], yi = ring[i][1];
      const xj = ring[j][0], yj = ring[j][1];
      const intersect = ((yi > lat) !== (yj > lat)) &&
        (lng < (xj - xi) * (lat - yi) / ((yj - yi) || 1e-12) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function pointInPolygon(lng, lat, polygon){
    if (!Array.isArray(polygon) || !polygon.length) return false;
    if (!pointInRing(lng, lat, polygon[0])) return false;
    for (let i = 1; i < polygon.length; i++) {
      if (pointInRing(lng, lat, polygon[i])) return false;
    }
    return true;
  }

  function pointInGeometry(lng, lat, geometry){
    if (!geometry) return false;
    if (geometry.type === "Polygon") {
      return pointInPolygon(lng, lat, geometry.coordinates);
    }
    if (geometry.type === "MultiPolygon") {
      return geometry.coordinates.some(poly => pointInPolygon(lng, lat, poly));
    }
    return false;
  }

  async function fetchAllRows() {
    const pageSize = 1000;
    let from = 0;
    let allRows = [];

    while (true) {
      const { data, error } = await supabase
        .from("nv_checkin_khach_hang")
        .select("id,lat,lng,ten_kh,ma_kh,dia_chi,phuong_xa,dien_thoai,ma_nv,ten_nv,Da_mua_hang,checkin_thang,con_hoat_dong")
        .eq("con_hoat_dong", true)
        .range(from, from + pageSize - 1);

      if (error) throw error;
      if (!data || data.length === 0) break;

      allRows = allRows.concat(data);

      if (data.length < pageSize) break;
      from += pageSize;
    }

    return allRows;
  }

  async function fetchAllCheckinRows() {
    const pageSize = 1000;
    let from = 0;
    let allRows = [];

    while (true) {
      const { data, error } = await supabase
        .from("nv_checkin")
        .select("ma_kh")
        .range(from, from + pageSize - 1);

      if (error) throw error;
      if (!data || data.length === 0) break;

      allRows = allRows.concat(data);

      if (data.length < pageSize) break;
      from += pageSize;
    }

    return allRows;
  }

  async function fetchGeoJsonFromUrl(url){
    const res = await fetch(url, { cache:"no-store" });
    if (!res.ok) throw new Error(`Không tải được ${url}: ${res.status}`);

    const geo = await res.json();
    if (!geo || geo.type !== "FeatureCollection" || !Array.isArray(geo.features)) {
      throw new Error(`GeoJSON sai định dạng FeatureCollection: ${url}`);
    }

    return normalizeGeoJsonProjection(filterHaiPhongGeoJson(geo));
  }

  async function loadHaiPhongGeoJson(){
    const urls = [GEOJSON_URL, ...GEOJSON_FALLBACK_URLS];

    for (const url of urls) {
      try {
        const geo = await fetchGeoJsonFromUrl(url);
        if (geo && Array.isArray(geo.features) && geo.features.length) {
          console.log("Đã tải GeoJSON:", url, geo.features.length, "phường/xã");
          return geo;
        }
      } catch (err) {
        console.warn("Không tải được GeoJSON:", url, err);
      }
    }

    return null;
  }

  const data = await fetchAllRows();
  const checkinHistory = await fetchAllCheckinRows();
  const tongCheckinTheoKH = new Map();

  checkinHistory.forEach(r => {
    const khKey = String(r.ma_kh || "").trim();
    if (!khKey) return;
    const current = tongCheckinTheoKH.get(khKey) || 0;
    tongCheckinTheoKH.set(khKey, current + 1);
  });

  let points = [];
  let markers = [];
  const pointById = new Map();

  data.forEach((r,i)=>{
    const lat = parseFloat(String(r.lat ?? "").trim());
    const lng = parseFloat(String(r.lng ?? "").trim());
    if(!Number.isFinite(lat) || !Number.isFinite(lng)) return;

    const stt = getMarkerLabel(r, i);
    const level = getLevel(r);
    const color = getColor(r);
    const markerClass = getMarkerClass(color);
    const bought = isBought(r.Da_mua_hang);

    const icon = L.divIcon({
      html:`<div class="${markerClass}">${esc(stt)}</div>`,
      iconSize:[26,26],
      iconAnchor:[13,13],
      className:""
    });

    const googleMapLink = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    const formLink = `./checkin_khach_hang_form.html?id=${encodeURIComponent(r.id)}`;
    const rowId = String(r.id || "").trim();
    const khKey = String(r.ma_kh || "").trim();
    const tongCheckinKH = tongCheckinTheoKH.get(khKey) || 0;

    const mk = L.marker([lat,lng],{icon}).bindPopup(`
      <b>${esc(r.ten_kh || "Không tên")}</b><br>
      ID: ${esc(r.id || "")}<br>
      Mã KH: ${esc(r.ma_kh || "")}<br>
      Địa chỉ: ${esc(r.dia_chi || "")}<br>
      Phường/Xã: ${esc(r.phuong_moi || r.phuong_xa_moi || r.phuong_xa || "")}<br>
      ĐT: ${esc(r.dien_thoai || "")}<br>
      NV: ${esc(r.ten_nv || r.ma_nv || "")}<br>
      Tổng check-in KH: <b>${esc(tongCheckinKH)}</b><br>
      Checkin tháng: <b>${esc(toNumber(r.checkin_thang, 0))}</b><br>
      Cấp độ: <b>${esc(level)}</b><br>
      Màu: <b>${
        color === "purple" ? "Tím" :
        color === "orange" ? "Cam" :
        "Đỏ"
      }</b><br>
      Mua hàng: <b>${bought ? "Đã mua" : "Chưa mua"}</b><br>
      Còn hoạt động: <b>${r.con_hoat_dong === false ? "Không" : "Có"}</b>

      <br><br>
      <button type="button"
         data-form-link="${esc(formLink)}"
         style="display:block;width:100%;padding:10px 12px;background:#16a34a;color:white;text-align:center;border:0;border-radius:8px;text-decoration:none;font-weight:700;cursor:pointer;">
         Mở form khách hàng
      </button>

      ${rowId ? `<button type="button"
         data-stop-id="${esc(rowId)}"
         style="display:block;width:100%;margin-top:8px;padding:10px 12px;background:#dc2626;color:white;text-align:center;border:0;border-radius:8px;text-decoration:none;font-weight:700;cursor:pointer;">
         Ngừng hoạt động
      </button>` : ""}

      <a href="${googleMapLink}"
         target="_blank"
         rel="noopener"
         style="display:block;margin-top:8px;padding:10px 12px;background:#2563eb;color:white;text-align:center;border-radius:8px;text-decoration:none;font-weight:700;">
         📍 Chỉ đường Google Map
      </a>
    `);

    mk.addTo(map);

    const point = {
      stt,
      lat,
      lng,
      marker: mk,
      color,
      level,
      bought,
      wardKey: getWardKeyFromRow(r),
      wardName: String(r.phuong_moi || r.phuong_xa_moi || r.phuong_xa || "").trim(),
      nvCode: String(r.ma_nv || "").trim(),
      nvName: String(r.ten_nv || "").trim(),
      nvPhone: String(r.dien_thoai || "").trim(),
      row: r
    };

    points.push(point);
    if (rowId) pointById.set(rowId, point);

    markers.push(mk);
  });

  let wardLayer = null;
  let wardVisible = true;
  const wardFilter = document.getElementById("wardFilter");
  const wardLegend = document.getElementById("wardLegend");
  const geoToggle = document.getElementById("geoToggle");

  function prepareWardCounts(geo){
    const namedCount = new Map();
    points.forEach(p => {
      if (!p.wardKey) return;
      namedCount.set(p.wardKey, (namedCount.get(p.wardKey) || 0) + 1);
    });

    geo.features.forEach(feature => {
      const wardName = getWardNameFromFeature(feature);
      const wardKey = normalizeName(wardName);
      let count = namedCount.get(wardKey) || 0;

      if (!count) {
        count = points.filter(p => pointInGeometry(p.lng, p.lat, feature.geometry)).length;
      }

      feature.properties.__wardName = wardName;
      feature.properties.__wardKey = wardKey;
      feature.properties.__count = count;
    });
  }

  function buildWardFilter(geo){
    const rows = geo.features
      .map(f => ({
        key: f.properties.__wardKey,
        name: f.properties.__wardName,
        count: toNumber(f.properties.__count, 0)
      }))
      .filter(x => x.key && x.name)
      .sort((a, b) => a.name.localeCompare(b.name, "vi"));

    rows.forEach(x => {
      const opt = document.createElement("option");
      opt.value = x.key;
      opt.textContent = `${x.name} (${x.count})`;
      wardFilter.appendChild(opt);
    });
  }

  function createWardLayer(geo){
    prepareWardCounts(geo);
    buildWardFilter(geo);

    wardLayer = L.geoJSON(geo, {
      style: wardStyle,
      onEachFeature: (feature, layer) => {
        const name = feature.properties.__wardName || "Không rõ tên";
        const count = toNumber(feature.properties.__count, 0);
        const predecessors = feature.properties.predecessors || feature.properties.truocsapnhap || "";

        layer.bindPopup(`
          <b>${esc(name)}</b><br>
          Số khách trên bản đồ: <b>${esc(count)}</b>
          ${predecessors ? `<br>Trước sáp nhập: ${esc(predecessors)}` : ""}
        `);

        layer.on("mouseover", () => layer.setStyle({ weight:2, fillOpacity:0.42 }));
        layer.on("mouseout", () => layer.setStyle(wardStyle(feature)));
        layer.on("click", () => {
          wardFilter.value = feature.properties.__wardKey || "";
          applyFilter();
        });
      }
    }).addTo(map);

    wardLayer.eachLayer(layer => {
      const center = layer.getBounds && layer.getBounds().isValid() ? layer.getBounds().getCenter() : null;
      const name = layer.feature?.properties?.__wardName || "";
      if (!center || !name) return;
      const label = L.marker(center, {
        icon: L.divIcon({
          html:`<div class="ward-label">${esc(name)}</div>`,
          className:"",
          iconSize:[120,18],
          iconAnchor:[60,9]
        }),
        interactive:false
      });
      layer.feature.properties.__labelMarker = label;
      if (map.getZoom() >= 13) label.addTo(map);
    });

    wardLayer.bringToBack();
    wardLegend.classList.remove("is-hidden");
  }

  function updateWardLabels(){
    if (!wardLayer) return;
    const show = wardVisible && map.getZoom() >= 13;
    wardLayer.eachLayer(layer => {
      const label = layer.feature?.properties?.__labelMarker;
      if (!label) return;
      if (show) {
        if (!map.hasLayer(label)) label.addTo(map);
      } else {
        if (map.hasLayer(label)) map.removeLayer(label);
      }
    });
  }

  function setWardVisible(visible){
    wardVisible = visible;
    geoToggle.classList.toggle("is-off", !visible);
    geoToggle.textContent = visible ? "Phường mới" : "Ẩn phường";
    wardLegend.classList.toggle("is-hidden", !visible || !wardLayer);

    if (!wardLayer) return;
    if (visible) {
      if (!map.hasLayer(wardLayer)) wardLayer.addTo(map);
      wardLayer.bringToBack();
    } else {
      if (map.hasLayer(wardLayer)) map.removeLayer(wardLayer);
    }
    updateWardLabels();
  }

  const geo = await loadHaiPhongGeoJson();
  if (geo) {
    createWardLayer(geo);
  } else {
    geoToggle.textContent = "Thiếu GeoJSON";
    geoToggle.classList.add("is-off");
    wardFilter.disabled = true;
  }

  async function stopActiveById(id){
    const stopId = String(id || "").trim();
    if (!stopId) return;

    const point = pointById.get(stopId);
    const tenKh = point?.row?.ten_kh || "khách hàng này";

    const ok = confirm(`Bạn muốn ${tenKh} ngừng hoạt động địa chỉ này?`);
    if (!ok) return;

    const { error } = await supabase
      .from("nv_checkin_khach_hang")
      .update({ con_hoat_dong: false })
      .eq("id", Number(stopId));

    if (error) {
      alert("Lỗi cập nhật: " + error.message);
      return;
    }

    if (point) {
      point.row.con_hoat_dong = false;
      if (map.hasLayer(point.marker)) map.removeLayer(point.marker);
      point.marker.closePopup();
    }
  }

  function openCustomerForm(url){
    const w = Math.min(430, Math.max(320, window.screen.width - 24));
    const h = Math.min(760, Math.max(520, window.screen.height - 80));
    const left = Math.max(0, Math.round((window.screen.width - w) / 2));
    const top = Math.max(0, Math.round((window.screen.height - h) / 2));

    window.open(
      url,
      "formKhachHang",
      `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=yes`
    );
  }

  document.addEventListener("click", e => {
    const formBtn = e.target.closest("[data-form-link]");
    if (formBtn) {
      e.preventDefault();
      openCustomerForm(formBtn.dataset.formLink);
      return;
    }

    const btn = e.target.closest("[data-stop-id]");
    if (!btn) return;

    e.preventDefault();
    stopActiveById(btn.dataset.stopId);
  });

  if(markers.length){
    const grp = L.featureGroup(markers);
    map.fitBounds(grp.getBounds(),{padding:[50,50]});
  } else if (wardLayer) {
    map.fitBounds(wardLayer.getBounds(), { padding:[30,30] });
  }

  let userMarker = null;
  let userCircle = null;
  let lastLat = null;
  let lastLng = null;

  function showGPS(lat,lng){
    lastLat = lat;
    lastLng = lng;

    if(userMarker){
      userMarker.setLatLng([lat,lng]);
    } else {
      userMarker = L.circleMarker([lat,lng],{
        radius:8,
        color:"#b91c1c",
        fillColor:"#ef4444",
        fillOpacity:1,
        weight:3
      }).addTo(map);
    }

    if(userCircle){
      userCircle.setLatLng([lat,lng]);
    } else {
      userCircle = L.circle([lat,lng],{
        radius:100,
        color:"#f87171",
        fillColor:"#fecaca",
        fillOpacity:0.3,
        weight:1
      }).addTo(map);
    }
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      showGPS(lat,lng);
      map.setView([lat,lng],18);
    });

    navigator.geolocation.watchPosition(
      pos=>{ showGPS(pos.coords.latitude, pos.coords.longitude); },
      undefined,
      { enableHighAccuracy:true, timeout:3000, maximumAge:0 }
    );
  }

  document.getElementById("gpsBtn").onclick = ()=>{
    if(lastLat && lastLng){
      map.setView([lastLat,lastLng],18);
    }
  };

  geoToggle.onclick = () => {
    if (!wardLayer) return;
    setWardVisible(!wardVisible);
  };

  map.on("zoomend", updateWardLabels);

  const nvFilter = document.getElementById("nvFilter");
  const nvMap = new Map();

  points.forEach(p => {
    if (!p.nvCode) return;
    if (!nvMap.has(p.nvCode)) {
      const label = [p.nvCode, p.nvName].filter(Boolean).join(" - ") || p.nvCode;
      nvMap.set(p.nvCode, label);
    }
  });

  [...nvMap.entries()]
    .sort((a, b) => a[1].localeCompare(b[1], "vi"))
    .forEach(([code, label]) => {
      const opt = document.createElement("option");
      opt.value = code;
      opt.textContent = label;
      nvFilter.appendChild(opt);
    });

  const levelFilter = document.getElementById("levelFilter");
  const searchBox = document.getElementById("searchBox");

  function selectedWardContainsPoint(point, wardKey){
    if (!wardKey) return true;
    if (point.wardKey && point.wardKey === wardKey) return true;
    if (!wardLayer) return false;

    let found = false;
    wardLayer.eachLayer(layer => {
      if (found) return;
      const f = layer.feature;
      if (!f || f.properties.__wardKey !== wardKey) return;
      found = pointInGeometry(point.lng, point.lat, f.geometry);
    });
    return found;
  }

  function updateWardLayerFilter(){
    if (!wardLayer) return;
    const selectedWard = wardFilter.value;

    wardLayer.eachLayer(layer => {
      const key = layer.feature?.properties?.__wardKey || "";
      const show = !selectedWard || key === selectedWard;
      layer.setStyle({
        ...wardStyle(layer.feature),
        fillOpacity: show ? 0.32 : 0.06,
        opacity: show ? 0.9 : 0.25
      });
    });
  }

  function applyFilter(){
    const fLevel = levelFilter.value;
    const fNV = nvFilter.value;
    const fWard = wardFilter.value;
    const q = searchBox.value.trim().toLowerCase();

    points.forEach(p=>{
      const r = p.row;
      let ok = true;

      if (fLevel === "1" || fLevel === "2" || fLevel === "3") {
        if (p.level !== fLevel) ok = false;
      }

      if (fLevel === "buy" && !p.bought) ok = false;
      if (fLevel === "nobuy" && p.bought) ok = false;
      if (fNV && p.nvCode !== fNV) ok = false;
      if (fWard && !selectedWardContainsPoint(p, fWard)) ok = false;

      if(q){
        const text = `
          ${r.id || ""}
          ${r.ma_kh || ""}
          ${r.ten_kh || ""}
          ${r.dia_chi || ""}
          ${r.phuong_moi || ""}
          ${r.phuong_xa_moi || ""}
          ${r.phuong_xa || ""}
          ${r.dien_thoai || ""}
          ${r.ghi_chu || ""}
          ${r.ma_nv || ""}
          ${r.ten_nv || ""}
          ${r.checkin_thang || ""}
          ${p.bought ? "da mua hang" : "chua mua hang"}
        `.toLowerCase();

        if(!text.includes(q)) ok = false;
      }

      if(ok){
        if(!map.hasLayer(p.marker)) p.marker.addTo(map);
      }else{
        if(map.hasLayer(p.marker)) map.removeLayer(p.marker);
      }
    });

    updateWardLayerFilter();

    const remain = points.filter(p => map.hasLayer(p.marker));
    if(remain.length === 1){
      map.setView([remain[0].lat, remain[0].lng], 18);
    }
  }

  levelFilter.onchange = applyFilter;
  nvFilter.onchange = applyFilter;
  wardFilter.onchange = applyFilter;
  searchBox.oninput = applyFilter;

  updateWardLabels();

})().catch(err => {
  const msg = err && err.message ? err.message : "";
  if (msg === "Missing ma_nv" || msg === "Not logged in" || msg === "ma_nv mismatch") {
    return;
  }
  alert("Lỗi tải bản đồ: " + (err.message || err));
  console.error(err);
});
</script>

</body>
</html>
