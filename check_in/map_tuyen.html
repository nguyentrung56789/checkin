<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Bản đồ Check-in KH</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase -->
  <script src="./js/internal_key.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html,body{
      margin:0; padding:0;
      height:100%;
      overflow:hidden;
      font-family:system-ui;
    }
    #map{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
    }

    .leaflet-control-zoom{
      display:none !important;
    }

    .top-controls{
      position:fixed;
      top:10px;
      left:10px;
      right:10px;
      z-index:2000;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .row{
      display:flex;
      gap:8px;
      width:100%;
    }

    .row select, #searchBox{
      flex:1;
      padding:6px 8px;
      font-size:14px;
      border-radius:8px;
      border:1px solid #d1d5db;
      background:white;
    }

    #gpsBtn{
      width:40px;
      height:40px;
      border-radius:50%;
      border:none;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
      font-size:20px;
      cursor:pointer;
      flex:0 0 40px;
    }

    .mk-red,
    .mk-orange,
    .mk-purple{
      color:white;
      width:26px;
      height:26px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid white;
      font-weight:600;
      font-size:12px;
      box-shadow:0 0 0 1px rgba(0,0,0,0.3),0 4px 8px rgba(0,0,0,0.2);
    }

    .mk-red{ background:#ef4444; }
    .mk-orange{ background:#f59e0b; }
    .mk-purple{ background:#8b5cf6; }
  </style>
</head>

<body>

<div class="top-controls">
  <div class="row">
    <button id="gpsBtn">📍</button>

    <select id="levelFilter">
      <option value="">Tất cả</option>
      <option value="1">1 màu đỏ check in về (chưa có số đt)</option>
      <option value="2">2 màu cam (đã check in có đt)</option>
      <option value="3">3 màu tím (nv đã checkin ở tháng này)</option>
      <option value="buy">Khách đã mua hàng</option>
      <option value="nobuy">Khách chưa mua hàng</option>
    </select>

    <select id="nvFilter">
      <option value="">Nhân viên</option>
    </select>
  </div>

  <input id="searchBox" type="text" placeholder="Tìm kiếm KH...">
</div>

<div id="map"></div>


</body>
</html>
