<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111" />
  <title>Check-in (Camera + GPS + Âm thanh)</title>
  <link rel="stylesheet" href="css/app_checkin.css" />
</head>
<body>
  <div class="stage" id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>

    <!-- Nút đè trên camera -->
    <div class="bar" id="bar">
      <button id="btnStart"   class="btn btn-blue">Cam</button>
      <button id="btnShot"    class="btn btn-green" disabled>📸</button>
      <button id="btnZoomOut" class="btn btn-icon btn-gray" title="Thu nhỏ">➖</button>
      <button id="btnZoomIn"  class="btn btn-icon btn-gray" title="Phóng to">➕</button>
      <button id="btnTorch"   class="btn btn-icon btn-gray" title="Đèn">🔦</button>
      <button id="btnSound"   class="btn btn-icon btn-gray" title="Bật/Tắt tiếng">🔊</button>

      <!-- Nút MENU -->
      <button id="btnMenu" class="btn btn-gray" style="margin-left:8px">☰ Menu</button>
    </div>
  </div>

  <div id="tagInfo"></div>

  <div id="toast"></div>

  <iframe id="sink" name="sink" style="display:none"></iframe>

  <audio id="snapSound"
         src="https://cdn.jsdelivr.net/gh/naptha/tesseract.js@master/examples/browser/sound/snap.wav"
         preload="auto"></audio>

  <!-- KHÔNG CÒN mapSheet / mapHeader / mapFrame -->
  
<script src="../js/internal_key.js"></script>
<script src="../js/config.js"></script>
  <script defer src="../js/app_checkin.js"></script>

  <!-- Chuyển tới menu -->
  <script>
    document.getElementById('btnMenu')?.addEventListener('click', () => {
      location.href = "main.html";
    });
  </script>
</body>

</html>
